<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classique Mark | Mon Compte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background: #f4f6f5; font-family: 'Segoe UI', sans-serif; color: #333; }
        /* Style Vert et Gris */
        .bg-custom-green { background: #28a745; }
        .text-custom-green { color: #28a745; }
        .menu-item { background: white; border-bottom: 1px solid #e2e8f0; transition: 0.2s; }
        .menu-item:active { background: #f1f3f5; }
        .stats-box { background: #28a745; color: white; }
    </style>
</head>
<body class="pb-32">

    <!-- Bannière de marque -->
    <div class="w-full h-44 overflow-hidden shadow-md">
        <img src="IMG_5327.jpeg" class="w-full h-full object-cover">
    </div>

    <div class="px-0">
        <div class="stats-box p-6 grid grid-cols-2 gap-4 text-center">
            <div class="border-r border-white/20">
                <p id="userBalance" class="text-xl font-black italic">FC ...</p>
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-80">Solde du compte</p>
            </div>
            <div>
                <p id="displayPhone" class="text-xl font-black italic">+243 ...</p>
                <p class="text-[10px] font-bold uppercase tracking-widest opacity-80">Mon Identifiant</p>
            </div>
        </div>
    </div>

    <!-- Section Actions Rapides -->
    <div class="bg-white py-6 grid grid-cols-3 gap-2 text-center text-black border-b border-slate-100">
        <a href="recharge.html" class="flex flex-col items-center active:scale-90 transition-transform">
            <div class="w-12 h-12 bg-slate-700 rounded-full flex items-center justify-center mb-2 shadow-lg">
                <i class="fa-solid fa-file-invoice-dollar text-white text-xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Recharger</span>
        </a>
        <a href="retrait.html" class="flex flex-col items-center active:scale-90 transition-transform">
            <div class="w-12 h-12 bg-slate-700 rounded-full flex items-center justify-center mb-2 shadow-lg">
                <i class="fa-solid fa-wallet text-white text-xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Retrait</span>
        </a>
        <a href="releve.html" class="flex flex-col items-center active:scale-90 transition-transform">
            <div class="w-12 h-12 bg-slate-700 rounded-full flex items-center justify-center mb-2 shadow-lg">
                <i class="fa-solid fa-list-ul text-white text-xl"></i>
            </div>
            <span class="text-[10px] font-bold uppercase tracking-tighter">Relevé</span>
        </a>
    </div>

    <div class="mt-4 space-y-1">
        <a href="#" class="menu-item flex items-center justify-between p-5">
            <span class="text-sm font-bold text-slate-700">À propos de Classique Mark</span>
            <i class="fa-solid fa-chevron-right text-slate-400 text-xs"></i>
        </a>
        <a href="#" class="menu-item flex items-center justify-between p-5">
            <span class="text-sm font-bold text-slate-700">Règles de la plateforme</span>
            <i class="fa-solid fa-chevron-right text-slate-400 text-xs"></i>
        </a>
        <a href="support.html" class="menu-item flex items-center justify-between p-5">
            <span class="text-sm font-bold text-slate-700">Service client</span>
            <i class="fa-solid fa-chevron-right text-slate-400 text-xs"></i>
        </a>
        <button onclick="logout()" class="w-full menu-item flex items-center justify-between p-5 text-left">
            <span class="text-sm font-bold text-red-500 italic uppercase tracking-widest">Sortie de secours</span>
            <i class="fa-solid fa-power-off text-red-500 text-xs"></i>
        </button>
    </div>

    <!-- Navigation bas de page Classique Mark -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white p-4 flex justify-around items-center z-50 shadow-inner border-t border-slate-100">
        <a href="dashboard.html" class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Maison</span>
        </a>
        <a href="produit.html" class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-bag-shopping text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Produit</span>
        </a>
        <a href="equipe.html" class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-users text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase">Équipe</span>
        </a>
        <a href="compte.html" class="flex flex-col items-center text-[#28a745]">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[9px] font-bold mt-1 uppercase tracking-tighter">Le mien</span>
        </a>
    </nav>

    <script>
        // CONFIGURATION FIREBASE - URL d'origine conservée
        const DB_URL = "https://alibaba-f22a0-default-rtdb.firebaseio.com/users";
        const userPhone = localStorage.getItem('userPhone');

        async function fetchUserProfile() {
            if (!userPhone) {
                window.location.href = "index.html";
                return;
            }

            try {
                // Le numéro s'affiche fièrement comme identifiant
                document.getElementById('displayPhone').innerText = `+${userPhone}`;

                const response = await fetch(`${DB_URL}/${userPhone}.json`);
                const user = await response.json();

                if (user) {
                    document.getElementById('userBalance').innerText = `FC ${parseFloat(user.balance).toLocaleString()}`;
                }
            } catch (error) {
                console.error("Erreur Classique Mark:", error);
                document.getElementById('userBalance').innerText = "Erreur";
            }
        }

        function logout() {
            if(confirm("Voulez-vous vraiment vous déconnecter de Classique Mark ?")) {
                localStorage.removeItem('userPhone');
                window.location.href = "index.html";
            }
        }

        window.onload = fetchUserProfile;
    </script>
</body>
</html>
